<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bancal - Controller</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cloud.byflash.fr/kilez.js"></script>
</head>
<body class="mobile-bg">
    <div id="waiting-ui" class="flex-center animate-fade-in" style="flex-direction: column; height: 100vh; text-align: center;">
        <h1>En attente...</h1>
        <p>Préparez-vous, la partie va bientôt commencer.</p>
        <button class="btn btn-error" onclick="window.location.href='/'" style="width: auto; padding-left: 60px; padding-right: 60px;">Quitter</button>
    </div>

    <div id="reveal-ui" style="display: none;">
        <h2 style="color: var(--text-muted);">Ton Personnage</h2>
        <canvas id="character-canvas" width="240" height="240"></canvas>
        <h1 id="reveal-countdown">5</h1>
    </div>

    <div id="controller-ui" style="display: none; flex-direction: column; height: 100vh;">
        <div class="mobile-header">
            <button class="btn btn-outline" onclick="quitGame()" style="width: auto; padding: 8px 16px; margin: 0; font-size: 0.8rem;">Quitter</button>
            <div id="mobile-timer">--:--</div>
        </div>

        <div id="joystick-zone"></div>
        <div class="action-buttons">
            <button id="btnA" class="game-btn">A (Action)</button>
            <button id="btnB" class="game-btn">B (Signal)</button>
        </div>
    </div>
    
    <script src="/js/modal.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/controller.js"></script>
    <script src="https://cloud.byflash.fr/affenbrotbaum.js"></script>
    <script>logConnection('game-bancal');</script>
</body>
</html>
