<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bancal - Controller</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="mobile-bg">
    <div id="waiting-ui" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; color: white;">
        <h1 style="font-size: 2rem; margin-bottom: 20px;">En attente de l'hôte...</h1>
        <p style="font-size: 1.2rem; color: #aaa; margin-bottom: 40px;">Regardez l'écran principal</p>
        <button onclick="window.location.href='/'" style="padding: 15px 40px; font-size: 1.2rem; background: #e74c3c; color: white; border: none; border-radius: 10px; box-shadow: 0 5px 0 #c0392b;">Quitter</button>
    </div>

    <div id="reveal-ui" style="display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; color: white; background: rgba(0,0,0,0.8); position: absolute; inset: 0; z-index: 50;">
        <h1 style="font-size: 2.5rem; margin-bottom: 30px; text-shadow: 0 2px 10px black;">Ton Personnage</h1>
        <canvas id="character-canvas" width="200" height="200" style="background: rgba(255,255,255,0.05); border-radius: 20px; box-shadow: 0 0 30px rgba(255,255,255,0.1);"></canvas>
        <h2 id="reveal-countdown" style="font-size: 4rem; margin-top: 40px; color: #f1c40f;">5</h2>
    </div>

    <div id="controller-ui" style="display: none;">
        <h2>Contrôleur</h2>
        <div id="joystick-zone"></div>
        <div class="action-buttons">
            <button id="btnA" class="game-btn">A (Action)</button>
            <button id="btnB" class="game-btn">B (Signal)</button>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/controller.js"></script>
</body>
</html>
