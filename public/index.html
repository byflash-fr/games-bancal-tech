<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bancal - Accueil</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cloud.byflash.fr/kilez.js"></script>
</head>
<body class="server-bg">
    <!-- Noble Loader -->
    <div id="global-loader">
        <div class="loader-ring"></div>
        <div class="loader-text">Chargement de l'univers</div>
    </div>

    <main class="landing-hero glass-panel">
        <h1>Bancal</h1>
        <p>Une épopée coopérative où chaque mouvement compte.</p>

        <section id="auth-panel">
            <div class="form-group">
                <label for="pseudo">Votre Identité</label>
                <input type="text" id="pseudo" placeholder="Ex: Messire Paul" maxlength="15">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <button onclick="createGame()" class="btn-noble">
                    Créer Salle
                </button>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="game-code" placeholder="CODE" style="width: 80px; text-align: center; text-transform: uppercase;">
                    <button onclick="joinGame()" class="btn-noble btn-outline" style="flex: 1;">
                        Rejoindre
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.body.classList.add('loaded');
            }, 800);
        });

        function createGame() {
            const pseudo = document.getElementById('pseudo').value || "Anonyme";
            window.location.href = `/host.html?pseudo=${encodeURIComponent(pseudo)}`;
        }

        function joinGame() {
            const pseudo = document.getElementById('pseudo').value || "Anonyme";
            const code = document.getElementById('game-code').value.toUpperCase();
            if(!code) return alert("Veuillez saisir un code");
            window.location.href = `/mobile.html?code=${code}&pseudo=${encodeURIComponent(pseudo)}`;
        }
    </script>
</body>
</html>
