<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bancal - Central Screen</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cloud.byflash.fr/kilez.js"></script>
</head>
<body class="server-bg">
    <div id="ui-container">
        <h1>Bancal</h1>
    </div>

    <div id="lobby-ui" class="lobby-container" style="display: none;">
        <!-- LEFT SIDE: Players -->
        <div class="lobby-side lobby-left">
            <h1>Joueurs <span id="player-count" class="player-count-badge">0</span></h1>

            <div class="player-list-container">
                <ul id="players-list">
                    <!-- Players injected via JS -->
                </ul>
            </div>
        </div>

        <!-- RIGHT SIDE: Code & QR -->
        <div class="lobby-side lobby-right">

            <h2>Code de la Partie</h2>
            <h1 id="game-code-display">----</h1>

            <div class="qr-container">
                <img id="qr-code-img" src="" alt="QR Code" style="width: 250px; height: 250px; display: none;" />
            </div>

            <div id="preview-section" style="display: none; flex-direction: column; align-items: center; margin-top: 20px;">
                <h3 style="margin-bottom: 10px; color: var(--text-secondary);">Ta Bille</h3>
                <canvas id="my-bille-preview" width="160" height="160"></canvas>
            </div>

            <p class="join-instruction">
                Scannez pour rejoindre ou allez sur :
                <span id="join-url-text" class="join-url">...</span>
            </p>

            <div class="lobby-buttons">
                <button class="btn btn-primary" onclick="startGame()">Démarrer la partie</button>
                <button class="btn btn-outline" onclick="cancelGame()">Annuler</button>
            </div>
        </div>
    </div>

    <!-- VICTORY UI -->
    <div id="victory-ui" class="lobby-container flex-center" style="display: none; flex-direction: column; background: none; border: none; box-shadow: none;">
        <div class="lobby-buttons" style="margin-top: 160px;">
            <button class="btn btn-primary" onclick="startGame()">Recommencer</button>
            <button class="btn btn-outline" onclick="cancelGame()">Quitter</button>
        </div>
    </div>

    <!-- DEFEAT UI -->
    <div id="defeat-ui" class="lobby-container flex-center" style="display: none; flex-direction: column; background: none; border: none; box-shadow: none;">
        <div class="lobby-buttons" style="margin-top: 160px;">
            <button class="btn btn-primary" onclick="returnToLobby()">Retour au lobby</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>


    <script src="/js/modal.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/renderer.js?v=2"></script>
    <script src="https://cloud.byflash.fr/affenbrotbaum.js"></script>
    <script>logConnection('game-bancal');</script>
</body>
</html>
